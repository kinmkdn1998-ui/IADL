<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-IADL 평가 - 경일신경과 내과</title>
    <style>
        :root { --primary: #2e7d32; --bg: #f8fbf8; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border: 1px solid #eee; overflow: hidden; }
        .header { background: var(--primary); color: white; padding: 25px 15px; text-align: center; }
        .header h1 { margin: 0; font-size: 1.4rem; margin-bottom: 8px; }
        .content { padding: 15px; }
        .notice-box { background: #fffde7; border: 1px solid #fff59d; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-size: 0.9rem; line-height: 1.5; color: #5d4037; }
        .patient-info { margin-bottom: 25px; padding: 15px; background: #f1f8e9; border-radius: 10px; }
        .q-card { margin-bottom: 25px; border-bottom: 1px solid #f0f0f0; padding-bottom: 20px; }
        .q-title { font-weight: bold; font-size: 1.05rem; color: #1b5e20; margin-bottom: 12px; display: block; line-height: 1.5; }
        .opt { display: flex; align-items: center; padding: 12px; border: 1px solid #eee; border-radius: 8px; cursor: pointer; font-size: 0.95rem; margin-bottom: 8px; }
        .opt input { margin-right: 12px; width: 20px; height: 20px; flex-shrink: 0; }
        .btn-submit { background: var(--primary); color: white; border: none; width: 100%; padding: 20px; border-radius: 12px; font-size: 1.2rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        footer { text-align: center; padding: 20px; color: #999; font-size: 0.8rem; border-top: 1px solid #eee; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>K-IADL (도구적 일상생활능력)</h1>
        <p>경일신경과 내과 임상심리실</p>
    </div>

    <form action="https://docs.google.com/forms/d/e/1FAIpQLSfp0IAB9o2hqRHyUQxK68WqZfyXgibQIt7Tc8WhQjVOQTc5aw/formResponse" method="POST" id="iadl-form">
        <div class="content">
            <div class="notice-box">
                <strong>💡 작성 안내</strong><br>
                환자의 신체적인 능력을 제외하고, <strong>기억력 및 인지력을 고려하여</strong> 작성해주시기 바랍니다.
            </div>

            <div class="patient-info">
                <label style="font-weight:bold; display:block; margin-bottom:8px;">환자 식별 정보 (성함/번호)</label>
                <input type="text" name="entry.1071895981" required placeholder="예: 김*철 / 12345" style="width:100%; padding:12px; border:1px solid #ccc; border-radius:6px; box-sizing:border-box;">
            </div>

            <div id="questions-list"></div>

            <input type="hidden" name="entry.882489969" id="hidden-total">
            <input type="hidden" name="entry.115265661" id="hidden-mean">

            <button type="submit" class="btn-submit">평가 완료 및 병원 전송</button>
        </div>
    </form>
    <footer>경일신경과 내과 | 053-652-2525</footer>
</div>

<script>
    // 주신 링크에서 추출한 진짜 문항별 ID들
    const entryIDs = [
        "entry.2124259223", "entry.582253665", "entry.635230924", "entry.1785643366", 
        "entry.1869049700", "entry.1511138627", "entry.1135273802", "entry.1383315405", 
        "entry.899007631", "entry.1227926093", "entry.1410498946"
    ];

    const questions = [
        "시장보기, 쇼핑", "교통수단 이용", "돈 관리", "집안일 하기", "음식 준비",
        "전화 사용", "약 복용", "최근 기억", "취미 생활", "텔레비전 시청", "집안 수리"
    ];

    const container = document.getElementById('questions-list');

    questions.forEach((q, i) => {
        container.innerHTML += `
            <div class="q-card">
                <span class="q-title">${i+1}. ${q}</span>
                <div class="options">
                    <label class="opt"><input type="radio" name="${entryIDs[i]}" value="0" required> 0: 혼자서 잘함</label>
                    <label class="opt"><input type="radio" name="${entryIDs[i]}" value="1"> 1: 약간의 도움 필요</label>
                    <label class="opt"><input type="radio" name="${entryIDs[i]}" value="2"> 2: 많은 도움 필요</label>
                    <label class="opt"><input type="radio" name="${entryIDs[i]}" value="3"> 3: 전적으로 도움 필요</label>
                    <label class="opt" style="color:#888;"><input type="radio" name="${entryIDs[i]}" value="N/A"> 해당 없음</label>
                </div>
            </div>
        `;
    });

    document.getElementById('iadl-form').onsubmit = function() {
        let sum = 0;
        let validCount = 0;
        const selected = document.querySelectorAll('input[type="radio"]:checked');
        
        selected.forEach(r => {
            if(r.value !== "N/A") {
                sum += parseInt(r.value);
                validCount++;
            }
        });

        let meanScore = validCount > 0 ? (sum / validCount).toFixed(2) : "0.00";

        document.getElementById('hidden-total').value = sum;
        document.getElementById('hidden-mean').value = meanScore;
        
        return true; 
    };
</script>
</body>
</html>
