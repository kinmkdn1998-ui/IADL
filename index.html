<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-IADL 평가 - 경일신경과내과의원</title>
    <style>
        :root { --primary: #2e7d32; --bg: #f8fbf8; }
        body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); overflow: hidden; border: 1px solid #eee; }
        .header { background: var(--primary); color: white; padding: 25px 15px; text-align: center; }
        .header h1 { margin: 0; font-size: 1.4rem; margin-bottom: 8px; }
        .content { padding: 15px; }
        .notice-box { background: #fffde7; border: 1px solid #fff59d; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-size: 0.9rem; line-height: 1.5; color: #5d4037; }
        .patient-info { margin-bottom: 25px; padding: 15px; background: #f1f8e9; border-radius: 10px; }
        .q-card { margin-bottom: 25px; border-bottom: 1px solid #f0f0f0; padding-bottom: 20px; }
        .q-title { font-weight: bold; font-size: 1.05rem; color: #1b5e20; margin-bottom: 12px; display: block; line-height: 1.5; }
        .opt { display: flex; align-items: center; padding: 12px; border: 1px solid #eee; border-radius: 8px; cursor: pointer; font-size: 0.95rem; margin-bottom: 8px; transition: 0.2s; }
        .opt:hover { background: #f1f8e9; border-color: var(--primary); }
        .opt input { margin-right: 12px; width: 20px; height: 20px; flex-shrink: 0; }
        .btn-submit { background: var(--primary); color: white; border: none; width: 100%; padding: 20px; border-radius: 12px; font-size: 1.2rem; font-weight: bold; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        footer { text-align: center; padding: 25px; color: #999; font-size: 0.8rem; border-top: 1px solid #eee; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>K-IADL (도구적 일상생활능력)</h1>
        <p>경일신경과내과 임상심리실</p>
    </div>

    <form action="https://docs.google.com/forms/d/e/1FAIpQLSfp0IAB9o2hqRHyUQxK68WqZfyXgibQIt7Tc8WhQjVOQTc5aw/formResponse" method="POST" id="iadl-form">
        <div class="content">
            <div class="notice-box">
                <strong>💡 작성 안내</strong><br>
                환자의 신체적인 능력을 제외하고, <strong>기억력 및 인지력을 고려하여</strong> 작성해주시기 바랍니다.<br>
                <small>* '해당 없음'은 이전부터 한 적이 없어 평가할 수 없는 항목입니다.</small>
            </div>

            <div class="patient-info">
                <label style="font-weight:bold; display:block; margin-bottom:8px;">환자 식별 정보 (성함/번호)</label>
                <input type="text" name="entry.1666699313" required placeholder="예: 김*철 / 12345" style="width:100%; padding:12px; border:1px solid #ccc; border-radius:6px; box-sizing:border-box; font-size: 1rem;">
            </div>

            <div id="questions-list">
                </div>

            <input type="hidden" name="entry.1119565578" id="hidden-total"> <input type="hidden" name="entry.1011500366" id="hidden-mean"> <button type="submit" class="btn-submit">평가 완료 및 병원 전송</button>
        </div>
    </form>
    <footer>경일신경과내과의원 | 053-652-2525</footer>
</div>

<script>
    // 각 문항별 구글 폼 entry ID 매칭
    const entryIDs = [
        "entry.1044321356", "entry.1746200230", "entry.1102927906", "entry.1646271921", 
        "entry.1226154944", "entry.752316496", "entry.340919290", "entry.1287957790", 
        "entry.156551828", "entry.1989025287", "entry.195027581"
    ];

    const questions = [
        "시장보기, 쇼핑: 상점에 가서 계획한 물건들을 잊지 않으며 돈 계산 실수 없이 구매합니까?",
        "교통수단 이용: 대중교통을 이용하거나 스스로 운전해 길을 잃지 않고 목적지에 갑니까?",
        "돈 관리: 용돈을 관리하고, 은행에 가서 저축을 하는 등 돈과 관련된 일을 처리합니까?",
        "집안일 하기, 기구 사용: 진공청소기, 다리미 등의 기구들을 잘 다루며 일상적인 집안일을 예전처럼 말끔하게 합니까?",
        "음식 준비: 적절한 식사를 계획하여 재료를 준비하고, 예전과 같이 맛있게 음식을 만듭니까?",
        "전화 사용: 필요한 전화번호를 수첩에서 찾거나 기억하여 전화를 겁니까?",
        "약 복용: 시간과 용량을 지켜 약을 먹습니까?",
        "최근 기억: 약속, 어제의 일 또는 다른 사람에게 전달해야 할 내용 등을 기억합니까?",
        "취미 생활: 종교, 독서, 바둑, 장기, 화투, 산책, 운동 등의 예전에 하던 취미를 그대로 합니까?",
        "텔레비전 시청: 집중해서 텔레비전을 보며 그 내용을 이해합니까?",
        "집안 수리: 못 박기나 전구 끼우기 같은 집안 잡일을 수행합니까?"
    ];

    const container = document.getElementById('questions-list');

    questions.forEach((q, i) => {
        container.innerHTML += `
            <div class="q-card">
                <span class="q-title">${i+1}. ${q}</span>
                <div class="options">
                    <label class="opt"><input type="radio" name="${entryIDs[i]}" value="0" required> 0: 혼자서 잘함</label>
                    <label class="opt"><input type="radio" name="${entryIDs[i]}" value="1"> 1: 약간의 도움 필요</label>
                    <label class="opt"><input type="radio" name="${entryIDs[i]}" value="2"> 2: 많은 도움 필요</label>
                    <label class="opt"><input type="radio" name="${entryIDs[i]}" value="3"> 3: 전적으로 도움 필요</label>
                    <label class="opt" style="color:#888;"><input type="radio" name="${entryIDs[i]}" value="N/A"> 해당 없음 (평가 불가)</label>
                </div>
            </div>
        `;
    });

    document.getElementById('iadl-form').onsubmit = function() {
        let sum = 0;
        let validCount = 0;
        const selected = document.querySelectorAll('input[type="radio"]:checked');
        
        selected.forEach(r => {
            if(r.value !== "N/A") {
                sum += parseInt(r.value);
                validCount++;
            }
        });

        // 평균 점수 계산 (선생님이 주신 공식: 총점 / (11-NA))
        let meanScore = validCount > 0 ? (sum / validCount).toFixed(2) : "0.00";

        // 구글 폼의 총점/평균점수 필드에 값 주입
        document.getElementById('hidden-total').value = sum;
        document.getElementById('hidden-mean').value = meanScore;
        
        return true; 
    };
</script>

</body>
</html>
